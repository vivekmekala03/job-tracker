{% extends 'jobs/base.html' %}
{% block content %}

<div style="max-width:520px;margin:2rem auto;">
  <div class="card">
    <h2 style="margin-bottom:1.5rem;font-size:1.3rem;">{{ title }}</h2>

    <form method="POST">
      {% csrf_token %}
      {% for field in form %}
        <div style="margin-bottom:1.1rem;">
          <label style="display:block;font-size:0.85rem;font-weight:500;margin-bottom:4px;">
            {{ field.label }}
          </label>
          {{ field }}
          {% if field.errors %}
            <p style="color:#e53e3e;font-size:0.8rem;margin-top:4px;">{{ field.errors.0 }}</p>
          {% endif %}
        </div>
      {% endfor %}

      <div style="display:flex;gap:0.75rem;margin-top:1.25rem;">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'dashboard' %}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
