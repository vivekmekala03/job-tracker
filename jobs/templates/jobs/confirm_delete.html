{% extends 'jobs/base.html' %}
{% block content %}

<div style="max-width:440px;margin:4rem auto;">
  <div class="card" style="text-align:center;padding:2.5rem;">
    <h2 style="font-size:1.2rem;margin-bottom:0.75rem;">Delete this application?</h2>
    <p style="color:#718096;margin-bottom:2rem;">
      <strong>{{ job.role }}</strong> at <strong>{{ job.company }}</strong> will be permanently removed.
    </p>

    <form method="POST" style="display:flex;justify-content:center;gap:0.75rem;">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Yes, delete</button>
      <a href="{% url 'dashboard' %}" class="btn btn-ghost">Cancel</a>
    </form>
  </div>
</div>

{% endblock %}
