{% extends 'jobs/base.html' %}
{% block content %}

<div style="max-width:460px; margin: 3rem auto;">
  <div class="card">
    <h2 style="margin-bottom:1.5rem;font-size:1.4rem;">Create your account</h2>

    <form method="POST">
      {% csrf_token %}
      {% for field in form %}
        <div style="margin-bottom:1rem;">
          <label style="display:block;font-size:0.85rem;font-weight:500;margin-bottom:4px;">
            {{ field.label }}
          </label>
          {{ field }}
          {% if field.errors %}
            <p style="color:#e53e3e;font-size:0.8rem;margin-top:4px;">{{ field.errors.0 }}</p>
          {% endif %}
        </div>
      {% endfor %}

      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem;">
        Create account
      </button>
    </form>

    <p style="margin-top:1.25rem;font-size:0.875rem;color:#718096;text-align:center;">
      Already have an account? <a href="{% url 'login' %}" style="color:#4f46e5;">Log in</a>
    </p>
  </div>
</div>

{% endblock %}
